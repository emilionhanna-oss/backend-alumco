<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-label="Primeros auxilios">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1a2840"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- icon: medical cross in circle -->
  <g transform="translate(150,120)">
    <circle cx="200" cy="200" r="170" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.25)" stroke-width="4"/>
    <rect x="175" y="110" width="50" height="180" rx="12" fill="url(#accent)"/>
    <rect x="110" y="175" width="180" height="50" rx="12" fill="url(#accent)"/>
  </g>

  <g fill="#ffffff">
    <text x="520" y="230" font-size="44" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-weight="800">Primeros Auxilios</text>
    <text x="520" y="285" font-size="22" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" opacity="0.85">Signos de alerta • respuesta inicial • derivación</text>
  </g>
</svg>
