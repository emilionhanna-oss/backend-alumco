<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-label="Trato digno y ética">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1a2840"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- icon: heart + hands (abstract) -->
  <g transform="translate(145,130)">
    <path d="M240 120 C240 70 200 40 160 40 C120 40 90 70 90 110 C90 170 150 220 240 290 C330 220 390 170 390 110 C390 70 360 40 320 40 C280 40 240 70 240 120 Z" fill="url(#accent)" opacity="0.95"/>

    <path d="M60 300 C120 260 170 260 220 290 C240 305 260 305 280 290 C330 260 380 260 440 300" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="12" stroke-linecap="round"/>
    <path d="M90 330 C150 290 190 295 230 322" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="10" stroke-linecap="round"/>
    <path d="M390 330 C330 290 290 295 250 322" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g fill="#ffffff">
    <text x="520" y="230" font-size="44" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-weight="800">Trato Digno y Ética</text>
    <text x="520" y="285" font-size="22" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" opacity="0.85">Cuidado centrado en la persona • respeto • comunicación</text>
  </g>
</svg>
